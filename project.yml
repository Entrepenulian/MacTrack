name: MacTrack
options:
  bundleIdPrefix: com.mactrack
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    ENABLE_HARDENED_RUNTIME: "NO"
    DEAD_CODE_STRIPPING: "YES"
    COMBINE_HIDPI_IMAGES: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  MacTrack:
    type: application
    platform: macOS
    sources:
      - path: MacTrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mactrack.MacTrack
        PRODUCT_NAME: MacTrack
        OTHER_LDFLAGS: "-lsqlite3"
        INFOPLIST_KEY_LSUIElement: "YES"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_ENTITLEMENTS: MacTrack/Resources/MacTrack.entitlements
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "MacTrack reads the active tab's address in your browser so it can measure how long you spend on each website. This stays entirely on your Mac."
    info:
      path: MacTrack/Resources/Info.generated.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: MacTrack
        LSMinimumSystemVersion: "26.0"
        NSAppleEventsUsageDescription: "MacTrack reads the active tab's address in your browser so it can measure how long you spend on each website. This stays entirely on your Mac."
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
